name: Release

on:
  push:
    branches: [main]
    paths:
      - "custom_components/**"
      - "hacs.json"

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate CalVer version
        id: version
        run: |
          # CalVer format: YYYY.M.PATCH
          # PATCH is the number of releases this month (0-indexed)
          YEAR=$(date +%Y)
          MONTH=$(date +%-m)
          PREFIX="${YEAR}.${MONTH}"

          # Count existing tags with this prefix to determine patch number
          EXISTING=$(git tag -l "v${PREFIX}.*" | wc -l | tr -d ' ')
          VERSION="${PREFIX}.${EXISTING}"

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
          echo "Generated version: ${VERSION}"

      - name: Update manifest.json version
        run: |
          cd custom_components/winix_purifiers
          jq --arg v "${{ steps.version.outputs.version }}" '.version = $v' manifest.json > tmp.json
          mv tmp.json manifest.json

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/winix_purifiers/manifest.json
          git diff --cached --quiet || git commit -m "[skip ci] release: ${{ steps.version.outputs.version }}"
          git push

      - name: Create tag
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Create zip for HACS
        run: |
          cd custom_components
          zip -r ../winix_purifiers.zip winix_purifiers/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.version }}
          files: winix_purifiers.zip
          generate_release_notes: true
