name: Model Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # Monday at 6am UTC

jobs:
  check-models:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Check for new models or attributes
        run: python tests/check_models.py
        env:
          WINIX_USERNAME: ${{ secrets.WINIX_USERNAME }}
          WINIX_PASSWORD: ${{ secrets.WINIX_PASSWORD }}
